<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Minigolf Seguro</title>
    <style>
        body { margin: 0; background: #2d5a27; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { background: #4a9c40; border: 15px solid #3e2723; border-radius: 10px; cursor: crosshair; }
    </style>
</head>
<body>
    <h1>¡Feliz Cumpleaños!</h1>
    <canvas id="game" width="700" height="400"></canvas>
    <p>Haz clic y arrastra suavemente para lanzar.</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;

        const engine = Engine.create();
        engine.world.gravity.y = 0;

        const render = Render.create({
            element: document.body,
            canvas: document.getElementById('game'),
            engine: engine,
            options: { width: 700, height: 400, wireframes: false, background: '#4a9c40' }
        });

        // Bola con mayor fricción y menos rebote
        const ball = Bodies.circle(100, 200, 10, { 
            restitution: 0.3, 
            friction: 0.2, 
            frictionAir: 0.08 
        });
        
        const hole = Bodies.circle(600, 200, 20, { isStatic: true, isSensor: true, render: { fillStyle: '#000' } });

        // Paredes mucho más gruesas (50px) para que no pueda atravesarlas
        const wallThickness = 50;
        const walls = [
            Bodies.rectangle(350, -25, 700, wallThickness, { isStatic: true }),
            Bodies.rectangle(350, 425, 700, wallThickness, { isStatic: true }),
            Bodies.rectangle(-25, 200, wallThickness, 400, { isStatic: true }),
            Bodies.rectangle(725, 200, wallThickness, 400, { isStatic: true })
        ];

        const obstacle = Bodies.rectangle(350, 200, 20, 150, { isStatic: true, render: { fillStyle: '#3e2723' } });

        Composite.add(engine.world, [ball, hole, ...walls, obstacle]);

        let isDragging = false;
        render.canvas.addEventListener('mousedown', () => isDragging = true);
        render.canvas.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            const rect = render.canvas.getBoundingClientRect();
            const mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            
            // Calculamos vector y lo limitamos (Clamp) para que la fuerza no sea excesiva
            let force = Vector.sub(ball.position, mousePos);
            const maxForce = 0.5; 
            const magnitude = Vector.magnitude(force);
            if (magnitude > maxForce) {
                force = Vector.mult(Vector.normalise(force), maxForce);
            }

            Body.applyForce(ball, ball.position, Vector.mult(force, 0.02));
            isDragging = false;
        });

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if ((pair.bodyA === ball && pair.bodyB === hole) || (pair.bodyB === ball && pair.bodyA === hole)) {
                    alert("¡Hoyo en uno!");
                    Body.setPosition(ball, { x: 100, y: 200 });
                    Body.setVelocity(ball, { x: 0, y: 0 });
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
